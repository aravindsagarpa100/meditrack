<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediTrack</title>

  <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #080d12;
      color: white;
      padding: 20px;
    }

    button {
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .med-card {
      background: #1a1f27;
      padding: 10px;
      margin-top: 15px;
      border-radius: 10px;
    }

    img {
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>MediTrack</h1>

  <h2 id="profileName">Loading...</h2>
  <h4 id="caregiverName">Loading...</h4>

  <button id="loginBtn">Login with Google</button>

  <input
    type="file"
    accept="image/*"
    capture="environment"
    id="photoInput"
    hidden
  />

  <button id="takePhotoBtn">
    Upload Proof Photo
  </button>

  <div id="medicationList"></div>

  <script type="module" src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

</body>
</html>
